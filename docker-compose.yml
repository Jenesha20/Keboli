services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: keboli_user
      POSTGRES_PASSWORD: jene2011
      POSTGRES_DB: keboli
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql+asyncpg://keboli_user:jene2011@db:5432/keboli
      - SECRET_KEY=supersecret
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - DEEPGRAM_API_KEY=b5d65eb26fa2085f437036de731712ef73585e2e
      - GROQ_API_KEY=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
      - GROQ_MODEL=llama-3.3-70b-versatile
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:8001"]
    ports:
      - "8000:8000"

  interview_agent:
    build:
      context: ./interview_agent
      dockerfile: Dockerfile
    restart: always
    environment:
      - GROQ_API_KEY=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
    ports:
      - "8001:8001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data: