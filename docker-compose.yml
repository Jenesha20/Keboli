      - LIVEKIT_API_SECRET=NMGj2OLYo6zMiiAI6NOL0i8leTIYT0gqtQzauISAEPY

      - DEEPGRAM_API_KEY=b5d65eb26fa2085f437036de731712ef73585e2e

      - BEY_API_KEY=sk-y_Kj45VlQyDngUVgUjKzyZco0Zd38TxJW-2v5EKzc5s
